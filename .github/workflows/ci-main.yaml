name: CI - Main

on:
  workflow_dispatch:  # manual trigger via GitHub Actions UI

  # push:
  #   branches:
  #     - main

jobs:
  # ─── STAGE 1 (parallel) ───────────────────────────────────────────────────

  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l -e .)
          if [ -n "$unformatted" ]; then
            echo "These files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: go build ./cmd/server/...

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... -v -race -count=1

  # ─── STAGE 2 (parallel) ───────────────────────────────────────────────────

  sca:
    name: SCA - Dependency Vulnerabilities
    runs-on: ubuntu-latest
    needs: [lint-format, secret-scan, build-check, unit-tests]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  sast:
    name: SAST - Static Security Analysis
    runs-on: ubuntu-latest
    needs: [lint-format, secret-scan, build-check, unit-tests]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: gosec -exclude-generated ./...

  # ─── STAGE 3 ──────────────────────────────────────────────────────────────

  build-and-stage:
    name: Build & Stage Image (ghcr.io)
    runs-on: ubuntu-latest
    needs: [sca, sast]
    permissions:
      contents: read
      packages: write
    outputs:
      staged-image: ${{ steps.image-ref.outputs.ref }}
      image-digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v5

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=staging

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ghcr.io (staging)
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Extract single image ref for scanning
        id: image-ref
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "ref=ghcr.io/${{ github.repository }}:sha-${SHORT_SHA}" >> $GITHUB_OUTPUT

  # ─── STAGE 4 ──────────────────────────────────────────────────────────────

  scan-image:
    name: Scan Image for CVEs
    runs-on: ubuntu-latest
    needs: [build-and-stage]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-and-stage.outputs.staged-image }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

  # ─── STAGE 5 ──────────────────────────────────────────────────────────────

  push-and-sign:
    name: Push & Sign Image (Docker Hub)
    runs-on: ubuntu-latest
    needs: [scan-image, build-and-stage]
    permissions:
      id-token: write
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v5

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker Hub metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Push scanned image to Docker Hub
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes \
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend@${{ steps.push.outputs.digest }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ secrets.DOCKERHUB_USERNAME }}/frontend@${{ steps.push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attach SBOM to image
        run: |
          cosign attach sbom \
            --sbom sbom.spdx.json \
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend@${{ steps.push.outputs.digest }}

  # ─── STAGE 6 — Deploy & Test on kind ──────────────────────────────────────

  e2e-tests:
    name: E2E & Load Tests
    runs-on: ubuntu-latest
    needs: [push-and-sign, build-and-stage]
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download dependencies
        run: go mod download

      # ── Cluster setup ──────────────────────────────────────────────────

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Create kind cluster
        run: kind create cluster --name frontend-ci --wait 60s

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and load frontend image into kind
        run: |
          docker pull ${{ needs.build-and-stage.outputs.staged-image }}
          kind load docker-image ${{ needs.build-and-stage.outputs.staged-image }} --name frontend-ci

      - name: Create namespace
        run: kubectl apply -f ci/k8s/namespace.yaml

      - name: Apply frontend manifests
        env:
          SERVICE_IMAGE: ${{ needs.build-and-stage.outputs.staged-image }}
        run: envsubst < ci/k8s/frontend.yaml | kubectl apply -f -

      - name: Wait for frontend ready
        run: |
          kubectl wait --for=condition=ready pod \
            -l app=frontend \
            -n ci-test \
            --timeout=120s

      # ── Port forward ───────────────────────────────────────────────────

      - name: Port forward frontend service
        run: |
          kubectl port-forward svc/frontend 8080:8080 -n ci-test &
          sleep 3

      # ── Smoke test ─────────────────────────────────────────────────────

      - name: Smoke test - health check
        run: |
          response=$(curl -sf http://localhost:8080/_healthz)
          if [ "$response" != "ok" ]; then
            echo "FAIL: expected 'ok', got '$response'"
            exit 1
          fi
          echo "PASS: health check returned 'ok'"

      # ── E2E tests ──────────────────────────────────────────────────────

      - name: E2E tests
        env:
          FRONTEND_ADDR: "http://localhost:8080"
          SKIP_DOWNSTREAM_TESTS: "true"
        run: go test -tags e2e ./tests/e2e/... -v -timeout 60s

      # ── Load test ──────────────────────────────────────────────────────

      - name: Install hey
        run: go install github.com/rakyll/hey@latest

      - name: Load test
        run: |
          hey -n 1000 -c 10 -q 100 http://localhost:8080/_healthz | tee /tmp/hey-result.txt

      - name: Check load test thresholds
        run: |
          cat /tmp/hey-result.txt

          # Count successful (200) responses
          STATUS_200=$(grep '\[200\]' /tmp/hey-result.txt | awk '{print $2}')
          STATUS_200=${STATUS_200:-0}
          NON_200=$((1000 - STATUS_200))

          # Extract p99 latency (in seconds) and convert to ms
          P99_SEC=$(grep "99%" /tmp/hey-result.txt | awk '{print $3}')
          P99_MS=$(printf "%.0f" $(echo "$P99_SEC * 1000" | bc))

          echo "Successful responses: $STATUS_200 / 1000"
          echo "Non-200 responses: $NON_200"
          echo "p99 latency: ${P99_MS}ms"

          if [ "$NON_200" -gt 10 ]; then
            echo "FAIL: error rate exceeds 1% ($NON_200 / 1000 failed)"
            exit 1
          fi

          if [ "$P99_MS" -gt 200 ]; then
            echo "FAIL: p99 latency ${P99_MS}ms exceeds 200ms threshold"
            exit 1
          fi

          echo "PASS: error_rate=$(echo "scale=2; $NON_200 / 10" | bc)% p99=${P99_MS}ms"

      # ── Teardown (always) ──────────────────────────────────────────────

      - name: Teardown kind cluster
        if: always()
        run: kind delete cluster --name frontend-ci
